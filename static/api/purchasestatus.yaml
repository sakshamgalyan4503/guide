openapi: 3.0.3

info:
  title: PaySecure Purchase API
  version: 1.0.0

servers:
  - url: https://api.paysecure.net

paths:
  /api/v1/purchases/{purchaseId}:
    get:
      tags:
        - PURCHASE
      summary: Get purchase details by purchaseId

      parameters:
        - in: path
          name: purchaseId
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Purchase details retrieved successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PurchasePaid'
                  - $ref: '#/components/schemas/PurchaseInProcess'
                  - $ref: '#/components/schemas/PurchaseCancelled'

        '404':
          description: Purchase not found

components:
  schemas:

    Client:
      type: object
      properties:
        customerId:
          type: string
        email:
          type: string
        phone:
          type: string
        full_name:
          type: string
        date_of_birth:
          type: string
        street_address:
          type: string
        country:
          type: string
        city:
          type: string
        zip_code:
          type: string
        stateCode:
          type: string
        cc:
          type: array
          items:
            type: string
        bcc:
          type: array
          items:
            type: string
        tax_number:
          type: string

    PurchaseProduct:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: integer
        price:
          type: number
        discount:
          type: number
        tax_percent:
          type: string

    PurchaseDetails:
      type: object
      properties:
        currency:
          type: string
        products:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseProduct'
        total:
          type: number
        language:
          type: string
        notes:
          type: string
        debt:
          type: number
        total_formatted:
          type: number
        expireInMin:
          type: string
        taxAmount:
          type: number
        taxPercent:
          type: number
        request_client_details:
          type: array
          items:
            type: string
        email_message:
          type: string

    Payment:
      type: object
      properties:
        is_outgoing:
          type: boolean
        payment_type:
          type: string
        amount:
          type: number
        currency:
          type: string
        net_amount:
          type: number
        fee_amount:
          type: number
        pending_amount:
          type: number
        pending_unfreeze_on:
          type: string
          nullable: true
        description:
          type: string
        paid_on:
          type: integer
        remote_paid_on:
          type: integer

    BasePurchase:
      type: object
      properties:
        purchaseId:
          type: string
        client:
          $ref: '#/components/schemas/Client'
        updated_on:
          type: integer
        type:
          type: string
        paymentMethod:
          type: string
        amountUnit:
          type: string
        errorMsg:
          type: string
        redirectType:
          type: string
        force_recurring:
          type: boolean
        created_on:
          type: integer
        merchantRef:
          type: string
        merchantName:
          type: string
        purchase:
          $ref: '#/components/schemas/PurchaseDetails'
        payment:
          $ref: '#/components/schemas/Payment'
        status:
          type: string
        status_history:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              timestamp:
                type: integer
        viewedOn:
          type: integer
        is_test:
          type: boolean
        brand_id:
          type: string
        success_redirect:
          type: string
        failure_redirect:
          type: string
        checkout_url:
          type: string

    PurchasePaid:
      allOf:
        - $ref: '#/components/schemas/BasePurchase'
        - type: object
          properties:
            status:
              type: string
              example: PAID

    PurchaseInProcess:
      allOf:
        - $ref: '#/components/schemas/BasePurchase'
        - type: object
          properties:
            status:
              type: string
              example: PAYMENT_IN_PROCESS

    PurchaseCancelled:
      allOf:
        - $ref: '#/components/schemas/BasePurchase'
        - type: object
          properties:
            status:
              type: string
              example: CANCELLED
