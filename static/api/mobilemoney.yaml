openapi: 3.0.3

info:
  title: PaySecure Purchase API
  version: 1.0.0

servers:
  - url: https://api.paysecure.net

paths:
  /api/v1/purchases:
    post:
      tags:
        - MOBILE MONEY
      summary: Initiate a new purchase via MOBILE MONEY

      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: header
          name: Content-Type
          required: true
          schema:
            type: string
            example: application/json

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - client
                - purchase
                - paymentMethod
                - merchantRef
                - brand_id
                - success_redirect
                - failure_redirect
                - success_callback
                - failure_callback
              properties:
                client:
                  type: object
                  required:
                    - email
                    - full_name
                    - country
                    - city
                    - stateCode
                    - street_address
                    - zip_code
                    - phone
                  properties:
                    email:
                      type: string
                      format: email
                      example: client@email.com
                    full_name:
                      type: string
                      example: Client Name
                    country:
                      type: string
                      example: KE
                    city:
                      type: string
                      example: Nairobi
                    stateCode:
                      type: string
                      example: NB
                    street_address:
                      type: string
                      example: 123 5th Ave, Nairobi, Kenya 10010
                    zip_code:
                      type: string
                      example: 10010
                    phone:
                      type: string
                      example: +254759118686

                purchase:
                  type: object
                  required:
                    - currency
                    - products
                  properties:
                    currency:
                      type: string
                      example: KES
                    products:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                          - price
                        properties:
                          name:
                            type: string
                            example: h2334h
                          price:
                            type: number
                            example: 500

                paymentMethod:
                  type: string
                  example: MOBILEMONEY

                merchantRef:
                  type: string
                  example: rsfwesfrdffsaes

                brand_id:
                  type: string
                  format: uuid
                  example: 30f7ce6e-3b7e-46a2-9b50-484fc55be689

                success_redirect:
                  type: string
                  format: uri
                  example: https://your.success.redirect.com

                failure_redirect:
                  type: string
                  format: uri
                  example: https://your.failure.redirect.com

                pending_redirect:
                  type: string
                  format: uri
                  example: https://your.pending.redirect.com

                success_callback:
                  type: string
                  format: uri
                  example: https://your.success.callback.com

                failure_callback:
                  type: string
                  format: uri
                  example: https://your.failure.callback.com

                expiryinmin:
                  type: string
                  example: "30"

      responses:
        '200':
          description: Purchase Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  purchaseId:
                    type: string
                    example: 689c499197281b45aac6f3be
                  status:
                    type: string
                    example: PAYMENT_IN_PROCESS
                  checkout_url:
                    type: string
                    example: https://api.choicepay.ca/payments/689c499197281b45aac6f3be/

        '401':
          description: Authorization Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid Authorization
                  code:
                    type: string
                    example: Invalid_Authorization
